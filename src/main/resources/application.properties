spring.application.name=ddvs

# DB
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ddvs_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:plutoski12}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=10000

# JWT
jwt.secret=${JWT_SECRET:ddvs-super-secret-jwt-key-2026-production}
jwt.expiration=86400000

# Notification
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8080}

# Debugging
logging.level.org.springframework.security=DEBUG